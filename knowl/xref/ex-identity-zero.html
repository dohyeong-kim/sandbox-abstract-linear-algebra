</h4>
<div class="para">항등변환 <span class="process-math">\(I: V \to V\)</span> (<span class="process-math">\(I(v) = v\)</span>)를 생각합시다. 임의의 영이 아닌 벡터 <span class="process-math">\(v \in V\)</span>에 대하여 <span class="process-math">\(I(v) = 1 \cdot v\)</span>이므로, 모든 영이 아닌 벡터가 고유벡터이며 스칼라 <span class="process-math">\(1\)</span>이 유일한 고윳값이 됩니다. 영변환 <span class="process-math">\(0: V \to V\)</span>의 경우에는 <span class="process-math">\(0(v) = 0 \cdot v\)</span>이므로 <span class="process-math">\(0\)</span>이 유일한 고윳값이 됩니다.</div></article><span class="incontext"><a class="internal" href="03-01-eigen.html#ex-identity-zero">in-context</a></span>
