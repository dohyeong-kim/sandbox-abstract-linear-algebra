<span class="type">정리</span><span class="space"> </span><span class="codenumber">5.2.15</span><span class="period">.</span><span class="space"> </span><span class="title">슈뢰더-베른슈타인 정리.</span>
</h4>
<div class="para">두 집합 <span class="process-math">\(A\)</span>와 <span class="process-math">\(B\)</span>에 대하여 단사 함수 <span class="process-math">\(f: A \to B\)</span>와 단사 함수 <span class="process-math">\(g: B \to A\)</span>가 존재하면, 전단사 함수 <span class="process-math">\(h: A \to B\)</span>가 존재한다. (즉, <span class="process-math">\(|A| \le |B|\)</span>이고 <span class="process-math">\(|B| \le |A|\)</span>이면 <span class="process-math">\(|A| = |B|\)</span>이다.)</div></article><span class="incontext"><a class="internal" href="99-02-set-theory-background.html#thm-schroeder-bernstein">in-context</a></span>
