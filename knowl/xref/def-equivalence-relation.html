<article class="definition definition-like"><h3 class="heading">
<span class="type">정의</span><span class="space"> </span><span class="codenumber">5.3.1</span><span class="period">.</span><span class="space"> </span><span class="title">동치관계.</span>
</h3>
<div class="para">집합 <span class="process-math">\(X\)</span>에 대한 <dfn class="terminology">동치관계</dfn>는 다음과 같은 세 가지 성질을 만족하는 이항 관계 <span class="process-math">\(\sim\)</span>입니다.</div>
<ol class="decimal" id="def-equivalence-relation-3">
<li><div class="para">
<em class="emphasis">반사성</em>: 모든 <span class="process-math">\(x \in X\)</span>에 대해 <span class="process-math">\(x \sim x\)</span>입니다.</div></li>
<li><div class="para">
<em class="emphasis">대칭성</em>: 모든 <span class="process-math">\(x, y \in X\)</span>에 대해 <span class="process-math">\(x \sim y\)</span>이면 <span class="process-math">\(y \sim x\)</span>입니다.</div></li>
<li><div class="para">
<em class="emphasis">추이성</em>: 모든 <span class="process-math">\(x, y, z \in X\)</span>에 대해 <span class="process-math">\(x \sim y\)</span>이고 <span class="process-math">\(y \sim z\)</span>이면 <span class="process-math">\(x \sim z\)</span>입니다.</div></li>
</ol></article><span class="incontext"><a class="internal" href="99-03-equivalence.html#def-equivalence-relation">in-context</a></span>
